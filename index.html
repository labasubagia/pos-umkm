<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7e14ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="POS UMKM" />
  <link rel="apple-touch-icon" href="/pwa-icon.svg" />
  <title>POS UMKM</title>
  <!-- Decode the ?/ redirect produced by public/404.html so React Router
         receives the original path instead of a query-string fragment.
         See: https://github.com/rafgraph/spa-github-pages -->
  <script>
    (((l) => {
      if (l.search[1] === '/') {
        const decoded = l.search.slice(1).split('&').map((s) => s.replace(/~and~/g, '&')).join('?')
        window.history.replaceState(
          null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        )
      }
    })(window.location))
  </script>
  <!-- Google Identity Services. Loaded async so it doesn't block render. -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
